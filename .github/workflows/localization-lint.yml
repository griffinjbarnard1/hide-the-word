name: Localization Lint

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  localization-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run localization lint
        run: python3 scripts/localization_lint.py --base origin/main
