name: UI String Lint

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  ui-string-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Lint hardcoded UI strings
        run: python3 scripts/lint_hardcoded_ui_strings.py
