name: ScriptureMemory
options:
  bundleIdPrefix: com.griffinbarnard
packages:
  ScriptureMemory:
    path: .
settings:
  base:
    SWIFT_VERSION: 6.0
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  ScriptureMemoryWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Widget
        includes:
          - "**/*.swift"
      - path: Widget/Localizable.xcstrings
        buildPhase: resources
      - path: Widget/PrivacyInfo.xcprivacy
        buildPhase: resources
    entitlements:
      path: Widget/Widget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.griffinbarnard.ScriptureMemory
    settings:
      base:
        PRODUCT_NAME: ScriptureMemoryWidget
        PRODUCT_BUNDLE_IDENTIFIER: com.griffinbarnard.ScriptureMemory.Widget
        INFOPLIST_FILE: Widget/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        TARGETED_DEVICE_FAMILY: "1"

  ScriptureMemoryApp:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: App
        includes:
          - "**/*.swift"
      - path: App/Assets.xcassets
        buildPhase: resources
      - path: App/Localizable.xcstrings
        buildPhase: resources
      - path: App/PrivacyInfo.xcprivacy
        buildPhase: resources
    dependencies:
      - target: ScriptureMemoryWidget
        embed: true
      - package: ScriptureMemory
        product: ScriptureMemory
    entitlements:
      path: App/App.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.griffinbarnard.ScriptureMemory
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.griffinbarnard.ScriptureMemory
        com.apple.developer.icloud-services:
          - CloudKit
    settings:
      base:
        PRODUCT_NAME: ScriptureMemoryApp
        PRODUCT_BUNDLE_IDENTIFIER: com.griffinbarnard.ScriptureMemory
        ESV_API_KEY: ""
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        TARGETED_DEVICE_FAMILY: "1"
    scheme:
      testTargets:
        - ScriptureMemoryAppTests

  ScriptureMemoryAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Tests/ScriptureMemoryAppTests
    dependencies:
      - target: ScriptureMemoryApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.griffinbarnard.ScriptureMemory.Tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ScriptureMemoryApp.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/ScriptureMemoryApp"
        BUNDLE_LOADER: "$(TEST_HOST)"
